  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav id="navbar">
  <div class="nav-logo"><span>//</span> alikanch</div>

  </ul>
  <div class="hamburger" id="hamburger" onclick="toggleNav()">
    <span></span><span></span><span></span>
  </div>
</nav>

<section style="padding-top:100px;">
  <div class="section-inner">
    <div class="section-label">Writing</div>
    <h1 class="section-title">The <span>Blog</span></h1>
    <p style="color:var(--text-muted);font-size:15px;max-width:560px;margin-bottom:3rem;margin-top:-1.5rem;">
      Thoughts on network security, enterprise infrastructure, data centres, and lessons from 15 years in the field.
    </p>

    <div class="blog-grid" id="blog-grid">
      <!-- Blog posts are loaded from blog/posts.js -->
    </div>
  </div>
</section>

<footer>
  <div class="footer-inner">
    <div class="footer-copy">© 2025 Ali Asgar Kanchwala · Abu Dhabi, UAE</div>
    <div class="footer-links">
      <a href="index.html">Home</a>
      <a href="https://linkedin.com/in/alikanch7" target="_blank">LinkedIn</a>
      <a href="mailto:alikanch10@gmail.com">Email</a>
    </div>
  </div>
</footer>

<script src="js/main.js"></script>
<script src="blog/posts.js"></script>
<script>
  // Render blog cards
  const grid = document.getElementById('blog-grid');
  if (typeof blogPosts !== 'undefined' && blogPosts.length > 0) {
    blogPosts.forEach(post => {
      grid.innerHTML += `
        <div class="blog-card">
          <div class="blog-card-header">
            <div class="blog-tag">${post.tag}</div>
            <a href="blog/${post.slug}.html">
              <div class="blog-card-title">${post.title}</div>
            </a>
            <div class="blog-card-excerpt">${post.excerpt}</div>
          </div>
          <div class="blog-card-footer">
            <span class="blog-meta">${post.date} · ${post.readTime}</span>
            <a href="blog/${post.slug}.html" class="blog-read-link">Read →</a>
          </div>
        </div>`;
    });
  } else {
    grid.innerHTML = `
      <div class="blog-empty">
        <h3>No posts yet</h3>
        <p>First article coming soon. Check back shortly.</p>
        <a href="index.html" class="btn-outline">← Back to Home</a>
      </div>`;
  }
</script>
</body>
</html>
